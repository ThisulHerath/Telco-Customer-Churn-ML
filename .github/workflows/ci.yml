on:
    push:
        branches: [master] # Only trigger on master branch

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Docker Hub
              uses: docker/login-action@v2
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}
            
            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                    context: .
                    file: ./dockerfile # Path to your Dockerfile
                    push: true
                    tags: 00pizzalover00/churn-service:latest

            # AWS automation additions

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ap-south-1 # Matches your Mumbai setup

            - name: Force AWS ECS Service Update
              run: |
                aws ecs update-service \
                  --cluster churn-service-cluster \
                  --service churn-task-service-szyjip17 \
                  --force-new-deployment